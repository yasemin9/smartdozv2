name: smartdoz
description: SmartDoz — Akıllı İlaç Takip Sistemi
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  syncfusion_flutter_pdfviewer: ^33.2.3

  # HTTP istemcisi
  http: ^1.2.0

  # Token ve kullanıcı oturumu için yerel depolama (Web destekli)
  shared_preferences: ^2.2.3

  # Durum yönetimi
  provider: ^6.1.2

  # Tarih formatlama
  intl: ^0.19.0

  # URL açmak için (örneğin, prospektüs bağlantısı)
  url_launcher: ^6.2.6

  # Google Fonts (opsiyonel, güzel yazı tipi için)
  google_fonts: ^6.2.1

  # Modül 2: Takvim bileşeni
  table_calendar: ^3.1.2

  # Modül 7: İnteraktif grafik (MPR çizgi grafiği)
  fl_chart: ^0.69.0

  # Modül 4: OCR — Kamera ve galeri erişimi
  image_picker: ^1.2.1

  # Modül 6: Sesli Asistan — Konuşmadan Metne (STT) & Metinden Konuşmaya (TTS)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  
  # Modül 6: Runtime permission request (mikrofon, kamera vb.)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
